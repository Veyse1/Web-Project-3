<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gülümseten Köşe - Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-register">
    <div class="page-shell">
        <header class="site-header">
            <div class="hero">
                <div class="hero-copy">
                    <p class="eyebrow"><strong>Logo:</strong> :)</p>
                    <h1>Gülümseten Köşe</h1>
                    <p class="hero-text">Kayıt sayfası</p>
                </div>
            </div>

            <nav class="site-nav" aria-label="Ana menü">
                <a href="index.html">Ana Sayfa</a>
                <a href="resimler.html">Komik Resimler</a>
                <a href="videolar.html">Videolar</a>
                <a href="yazilar.html">Komik Yazılar</a>
                <a href="kayit.html" aria-current="page">Kayıt Ol</a>
                <a href="giris.htm">Giriş Yap</a>
            </nav>
        </header>

        <main class="page-content">
            <section class="section">
                <div class="intro-copy">
                    <h2>Siteye Kayıt Formu</h2>
                    <p>Bu sayfa sadece görüntü amaçlıdır. Form alanlarında HTML doğrulama özellikleri kullanılmıştır.</p>
                </div>
            </section>

            <section class="section">
                <div class="form-shell">
                    <form action="#" method="post" class="site-form">
                        <fieldset>
                            <legend>Kullanıcı Bilgileri</legend>

                            <div class="form-grid">
                                <div class="form-row">
                                    <label for="adsoyad">Ad Soyad:</label>
                                    <input type="text" id="adsoyad" name="adsoyad" required minlength="3" maxlength="40" placeholder="Adınızı ve soyadınızı yazınız">
                                </div>

                                <div class="form-row">
                                    <label for="kullaniciadi">Kullanıcı Adı:</label>
                                    <input type="text" id="kullaniciadi" name="kullaniciadi" required minlength="4" maxlength="20" pattern="[A-Za-z0-9]+">
                                </div>

                                <div class="form-row">
                                    <label for="eposta">E-posta:</label>
                                    <input type="email" id="eposta" name="eposta" required placeholder="ornek@mail.com">
                                </div>

                                <div class="form-row">
                                    <label for="sifre">Şifre:</label>
                                    <input type="password" id="sifre" name="sifre" required minlength="6" maxlength="20">
                                </div>

                                <div class="form-row">
                                    <label for="tel">Telefon:</label>
                                    <input type="tel" id="tel" name="tel" required pattern="[0-9]{10,11}" placeholder="5xxxxxxxxx">
                                </div>

                                <div class="form-row">
                                    <label for="dogumtarihi">Doğum Tarihi:</label>
                                    <input type="date" id="dogumtarihi" name="dogumtarihi" required>
                                </div>

                                <div class="choice-group">
                                    <p>Favori İçerik Türü:</p>
                                    <div class="choice-list">
                                        <label for="resimsec">
                                            <input type="radio" id="resimsec" name="favori" value="resim" required>
                                            <span>Komik Resimler</span>
                                        </label>
                                        <label for="videosec">
                                            <input type="radio" id="videosec" name="favori" value="video">
                                            <span>Videolar</span>
                                        </label>
                                        <label for="yazisec">
                                            <input type="radio" id="yazisec" name="favori" value="yazi">
                                            <span>Komik Yazılar</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="form-row">
                                    <label for="bolum">Bölüm:</label>
                                    <select id="bolum" name="bolum" required>
                                        <option value="">Seçiniz</option>
                                        <option value="bilgisayar">Bilgisayar Mühendisliği</option>
                                        <option value="yazilim">Yazılım Mühendisliği</option>
                                        <option value="elektrik">Elektrik Elektronik</option>
                                        <option value="diger">Diğer</option>
                                    </select>
                                </div>

                                <div class="form-row">
                                    <label for="mesaj">Kendinizden Kısaca Bahsedin:</label>
                                    <textarea id="mesaj" name="mesaj" rows="5" cols="40" minlength="10" maxlength="200" required></textarea>
                                </div>

                                <label class="toggle-row" for="onay">
                                    <input type="checkbox" id="onay" name="onay" required>
                                    <span>Kullanım koşullarını okudum ve kabul ediyorum.</span>
                                </label>

                                <div class="form-actions">
                                    <input type="submit" value="Kayıt Ol">
                                    <input type="reset" value="Temizle">
                                </div>
                            </div>
                        </fieldset>
                    </form>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <p>Gülümseten Köşe | Kayıt Sayfası</p>
        </footer>
    </div>
</body>
</html>
