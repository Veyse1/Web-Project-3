<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gülümseten Köşe - Giriş Yap</title>
</head>
<body>
    <header>
        <div>
            <p><strong>Logo:</strong> :)</p>
            <h1>Gülümseten Köşe</h1>
            <p>Giriş sayfası</p>
        </div>
        <nav>
            <a href="index.html">Ana Sayfa</a> |
            <a href="resimler.html">Komik Resimler</a> |
            <a href="videolar.html">Videolar</a> |
            <a href="yazilar.html">Komik Yazılar</a> |
            <a href="kayit.html">Kayıt Ol</a> |
            <a href="giris.htm">Giriş Yap</a>
        </nav>
        <hr>
    </header>

    <main>
        <section>
            <h2>Siteye Giriş Formu</h2>
            <p>Bu sayfa sadece görüntü amaçlıdır. Giriş formu HTML özellikleri ile doğrulanmaktadır.</p>
        </section>

        <section>
            <form action="#" method="post">
                <fieldset>
                    <legend>Giriş Bilgileri</legend>

                    <div>
                        <label for="giriseposta">E-posta:</label><br>
                        <input type="email" id="giriseposta" name="giriseposta" required placeholder="ornek@mail.com">
                    </div>
                    <br>

                    <div>
                        <label for="girissifre">Şifre:</label><br>
                        <input type="password" id="girissifre" name="girissifre" required minlength="6" maxlength="20">
                    </div>
                    <br>

                    <div>
                        <label for="uyegiris">Giriş Türü:</label><br>
                        <select id="uyegiris" name="uyegiris" required>
                            <option value="">Seçiniz</option>
                            <option value="normal">Normal Üye</option>
                            <option value="editor">Editor</option>
                            <option value="misafir">Misafir</option>
                        </select>
                    </div>
                    <br>

                    <div>
                        <input type="checkbox" id="hatirla" name="hatirla">
                        <label for="hatirla">Beni hatırla</label>
                    </div>
                    <br>

                    <div>
                        <input type="submit" value="Giriş Yap">
                        <input type="reset" value="Temizle">
                    </div>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <hr>
        <p>Gülümseten Köşe | Giriş Sayfası</p>
    </footer>
</body>
</html>
